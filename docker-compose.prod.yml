# v-channel-bridge - Production Docker Compose Configuration
# 사용법: docker compose -f docker-compose.prod.yml up -d --build
#
# 특징:
# - Nginx 리버스 프록시 (SSL/TLS 지원)
# - PostgreSQL + Redis
# - 리소스 제한 및 헬스체크
# - 프로덕션 최적화 빌드

services:
  # Nginx 리버스 프록시
  nginx:
    image: nginx:alpine
    container_name: v-project-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - v-project-network

  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:16-alpine
    container_name: v-project-postgres
    restart: always
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=v_project
      - POSTGRES_USER=${POSTGRES_USER:-vmsuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vmsuser} -d v_project"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - v-project-network

  # Redis 캐시 및 세션 스토어
  redis:
    image: redis:7-alpine
    container_name: v-project-redis
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - v-project-network

  # Backend API (프로덕션 모드)
  backend:
    build:
      context: ./apps/v-channel-bridge/backend
      dockerfile: Dockerfile
      args:
        - ENV=production
    container_name: v-project-bridge-backend
    restart: always
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.prod.yml:/app/docker-compose.yml:ro
    environment:
      - ENV=production
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vmsuser}:${POSTGRES_PASSWORD}@postgres:5432/v_project
      - DATABASE_DIR=/app/data
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    networks:
      - v-project-network

  # Frontend UI (프로덕션 모드 - Nginx)
  frontend:
    build:
      context: ./apps/v-channel-bridge/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
    container_name: v-project-bridge-frontend
    restart: always
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - v-project-network

networks:
  v-project-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  backend_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
