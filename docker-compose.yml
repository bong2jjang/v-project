services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:16-alpine
    container_name: v-project-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=v_project
      - POSTGRES_USER=vmsuser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vmspassword}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmsuser -d v_project"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - v-project-network

  # Redis 캐시 및 라우팅 룰 스토어
  redis:
    image: redis:7-alpine
    container_name: v-project-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - v-project-network

  # MailHog 개발용 메일 서버
  mailhog:
    image: mailhog/mailhog:latest
    container_name: v-project-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP 포트
      - "8025:8025"  # Web UI 포트
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - v-project-network

  # Backend API 서비스 (v-platform + v-channel-bridge)
  backend:
    build:
      context: ./apps/v-channel-bridge/backend
      dockerfile: Dockerfile
    container_name: v-channel-bridge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./apps/v-channel-bridge/backend:/app
      - ./platform/backend:/platform/backend
      - backend_data:/app/data
    environment:
      # v-channel-bridge
      - BRIDGE_TYPE=native
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/platform/backend
      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://vmsuser:vmspassword@postgres:5432/v_project}
      - DATABASE_DIR=/app/data
      # Redis (동적 라우팅 룰 저장)
      - REDIS_URL=${REDIS_URL:-redis://:redispassword@redis:6379/0}
      # Security
      - SECRET_KEY=${SECRET_KEY:-v-project-secret-key-change-in-production-12345}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # Email
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@v-project.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-v-channel-bridge}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      # Slack Provider (Socket Mode)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      # Teams Provider (Graph API)
      - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      - TEAMS_APP_ID=${TEAMS_APP_ID}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD}
      - TEAMS_TEAM_ID=${TEAMS_TEAM_ID}
      # Microsoft OAuth (Delegated Auth)
      - MS_OAUTH_REDIRECT_URI=${MS_OAUTH_REDIRECT_URI:-}
      # Graph API Change Notifications
      - BACKEND_URL=${BACKEND_URL:-https://w9hz7vqx-8000.jpe1.devtunnels.ms}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://w9hz7vqx-8000.jpe1.devtunnels.ms}
      - TEAMS_NOTIFICATION_URL=${TEAMS_NOTIFICATION_URL:-}
      # SSO: TEAMS_* 환경변수를 재사용 (별도 SSO 변수 불필요)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - v-project-network

  # Frontend UI 서비스
  frontend:
    build:
      context: ./apps/v-channel-bridge/frontend
      dockerfile: Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: v-channel-bridge-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/v-channel-bridge/frontend:/app
      - ./platform/frontend:/platform/frontend
      - /app/node_modules
      - /app/.vite
      - frontend-pnpm-store:/root/.local/share/pnpm/store
    command: sh -c "ln -sf /app/node_modules /platform/frontend/v-platform-core/node_modules && pnpm run dev -- --host 0.0.0.0"
    environment:
      - DOCKER_ENV=true
      - VITE_API_URL=
      - NODE_OPTIONS=--max-old-space-size=4096
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - v-project-network

  # Docusaurus 문서 사이트
  docusaurus:
    build:
      context: ./docusaurus
      dockerfile: Dockerfile.dev
    container_name: v-project-docusaurus
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./docusaurus:/app
      - /app/node_modules
      - /app/.docusaurus
      - docusaurus-pnpm-store:/root/.local/share/pnpm/store
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 420s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - v-project-network

  # v-platform-portal (포트 8080/5180)
  portal-backend:
    build:
      context: .
      dockerfile: apps/v-platform-portal/backend/Dockerfile
    container_name: v-platform-portal-backend
    ports:
      - "8080:8000"
    volumes:
      - ./apps/v-platform-portal/backend:/app
      - ./platform/backend:/platform/backend
    environment:
      - PYTHONPATH=/app:/platform/backend
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql://vmsuser:vmspassword@postgres:5432/v_project}
      - REDIS_URL=${REDIS_URL:-redis://:redispassword@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-v-platform-portal-secret-key-32chars!!}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - FRONTEND_URL=http://localhost:5180
      - PORTAL_APPS=v-channel-bridge|Channel Bridge|Slack ↔ Teams 메시지 브리지|MessageSquare|http://localhost:5173|http://v-channel-bridge-backend:8000,v-platform-template|Platform Template|플랫폼 템플릿 앱|LayoutDashboard|http://localhost:5174|http://v-project-template-backend:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - portal
    networks:
      - v-project-network

  portal-frontend:
    build:
      context: ./apps/v-platform-portal/frontend
      dockerfile: Dockerfile.dev
    container_name: v-platform-portal-frontend
    ports:
      - "5180:5173"
    volumes:
      - ./apps/v-platform-portal/frontend:/app
      - ./platform/frontend:/platform/frontend
      - /app/node_modules
      - /app/.vite
    command: sh -c "ln -sf /app/node_modules /platform/frontend/v-platform-core/node_modules && pnpm run dev -- --host 0.0.0.0"
    environment:
      - DOCKER_ENV=true
      - VITE_API_URL=
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      - portal-backend
    profiles:
      - portal
    networks:
      - v-project-network

  # v-platform-template (포트 8002/5174)
  template-backend:
    build:
      context: .
      dockerfile: apps/v-platform-template/backend/Dockerfile
    container_name: v-project-template-backend
    ports:
      - "8002:8000"
    volumes:
      - ./apps/v-platform-template/backend:/app
      - ./platform/backend:/platform/backend
    environment:
      - PYTHONPATH=/app:/platform/backend
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql://vmsuser:vmspassword@postgres:5432/v_project}
      - REDIS_URL=${REDIS_URL:-redis://:redispassword@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-v-platform-template-secret-key-32chars!!}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@v-project.local}
      - FRONTEND_URL=http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - template
    networks:
      - v-project-network

  template-frontend:
    build:
      context: ./apps/v-platform-template/frontend
      dockerfile: Dockerfile.dev
    container_name: v-project-template-frontend
    ports:
      - "5174:5173"
    volumes:
      - ./apps/v-platform-template/frontend:/app
      - ./platform/frontend:/platform/frontend
      - /app/node_modules
      - /app/.vite
    command: sh -c "ln -sf /app/node_modules /platform/frontend/v-platform-core/node_modules && pnpm run dev -- --host 0.0.0.0"
    environment:
      - DOCKER_ENV=true
      - VITE_API_URL=
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      - template-backend
    profiles:
      - template
    networks:
      - v-project-network

# 네트워크 정의
networks:
  v-project-network:
    driver: bridge

# 볼륨 정의
volumes:
  backend_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  frontend-pnpm-store:
    driver: local
  docusaurus-pnpm-store:
    driver: local
