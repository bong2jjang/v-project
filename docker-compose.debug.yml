# 디버그 환경 Docker Compose
# 사용법: docker compose -f docker-compose.debug.yml up -d
#
# 특징:
# - Backend: debugpy 원격 디버거 (포트 5678) + uvicorn --reload
# - Frontend: Vite dev server (HMR + source map)
# - VSCode에서 "Attach to Backend (Docker)" 실행하여 디버거 연결

services:
  # Backend API (디버그 모드 - debugpy 활성화)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: v-project-backend-debug
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy 원격 디버거 포트
    volumes:
      - ./backend:/app
      - backend_pip_cache:/root/.cache/pip
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENV=development
      - DEBUG=1
    command: >
      python -m debugpy
      --listen 0.0.0.0:5678
      --wait-for-client
      -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    networks:
      - v-project-network

  # Frontend UI (개발 모드 - Vite HMR)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: v-project-frontend-debug
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_started
    networks:
      - v-project-network

networks:
  v-project-network:
    driver: bridge

volumes:
  backend_pip_cache:
    driver: local
