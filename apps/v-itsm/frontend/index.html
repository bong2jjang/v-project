<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>v-itsm</title>
    <!-- Pretendard — 한영 혼합 최적화 폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <!-- FOUC 방지: 다크모드 + 색상 프리셋 깜빡임 차단 -->
    <script>
      (function() {
        var app = 'v-itsm';
        var t = localStorage.getItem(app + ':theme') || localStorage.getItem('theme');
        var p = localStorage.getItem(app + ':colorPreset') || localStorage.getItem('colorPreset');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        if (p && p !== 'blue') {
          document.documentElement.classList.add('theme-' + p);
        }
        var w = localStorage.getItem(app + ':contentWidth') || localStorage.getItem('contentWidth');
        if (w === 'wide') {
          document.documentElement.classList.add('layout-wide');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
