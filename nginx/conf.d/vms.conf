# VMS Matterbridge - Virtual Host Configuration

# Backend API 업스트림
upstream backend_api {
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Frontend 업스트림
upstream frontend_app {
    server frontend:80 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# HTTP 서버 (80) - HTTPS로 리다이렉트 또는 직접 서빙
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 헬스체크 엔드포인트 (리다이렉트 제외)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SSL 설정이 있으면 HTTPS로 리다이렉트 (주석 해제)
    # return 301 https://$host$request_uri;

    # SSL 없이 직접 서빙 (개발/테스트용)
    # API 프록시
    location /api/ {
        proxy_pass http://backend_api;

        # 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 버퍼링 비활성화 (실시간 스트림용)
        proxy_buffering off;
        proxy_cache off;
    }

    # Frontend 프록시
    location / {
        proxy_pass http://frontend_app;

        # 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 캐싱 (정적 파일)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_app;
            proxy_cache_valid 200 1h;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # 로그
    access_log /var/log/nginx/vms-access.log main;
    error_log /var/log/nginx/vms-error.log warn;
}

