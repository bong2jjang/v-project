# ──────────────────────────────────────────────────────────────────────────────
# Prometheus 설정 — v-project 멀티앱 모니터링 스택
#
# 원칙:
#  - 모든 v-platform 앱 백엔드는 동일한 job(`v-platform-apps`) 아래 수집
#  - `app` 라벨로 앱을 구분 (static_configs.labels) → PromQL 에서 by (app) 그룹 가능
#  - `instance` 는 DNS 주소(예: backend:8000) 를 그대로 유지
#  - 각 앱의 /metrics 는 FastAPI(v_platform) + prometheus_client 미들웨어 노출
# ──────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'v-project'
    environment: 'development'

# 알림 규칙 파일 (alerts.yml 은 동일 디렉터리에 마운트)
rule_files:
  - '/etc/prometheus/alerts.yml'

# 메트릭 수집 대상
scrape_configs:
  # ── Prometheus 자체 ─────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── v-platform 앱 메트릭 (단일 job, app 라벨로 분기) ──────────────────────
  # 앱 추가 시: 아래 패턴을 복제 + alerts.yml 화이트리스트에만 반영하면 됨.
  - job_name: 'v-platform-apps'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:8000']
        labels:
          app: 'v-channel-bridge'
      - targets: ['portal-backend:8000']
        labels:
          app: 'v-platform-portal'
      - targets: ['template-backend:8000']
        labels:
          app: 'v-platform-template'
      - targets: ['ui-builder-backend:8000']
        labels:
          app: 'v-ui-builder'
      - targets: ['itsm-backend:8000']
        labels:
          app: 'v-itsm'

  # ── 컨테이너 리소스 (cAdvisor) ──────────────────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ── 호스트 시스템 (Node Exporter) ───────────────────────────────────────────
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  # ── Loki / Promtail 자체 상태 ───────────────────────────────────────────────
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: '/metrics'

  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']
    metrics_path: '/metrics'
