# ──────────────────────────────────────────────────────────────────────────────
# v-project Prometheus 알림 규칙
#
# 라벨 모델:
#  - job="v-platform-apps" + app="<앱 이름>"  ← prometheus.yml 의 static_configs 참조
#  - 컨테이너 이름 regex: 모든 앱 컨테이너는 "v-project-*" 또는 "v-ui-builder-*"
#
# severity:
#  - critical → 즉시 대응 (페이지/SMS 권장)
#  - warning  → 근무 시간 내 조치
# ──────────────────────────────────────────────────────────────────────────────

groups:
  # ──────────────────────────────────────────────────────────────
  # v-platform 앱 공통 서비스 알림 (멀티앱)
  # ──────────────────────────────────────────────────────────────
  - name: v_platform_service_alerts
    interval: 30s
    rules:
      # 어느 한 앱 백엔드라도 다운
      - alert: PlatformAppDown
        expr: up{job="v-platform-apps"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "앱 백엔드 다운: {{ $labels.app }}"
          description: "{{ $labels.app }} 백엔드({{ $labels.instance }})가 1분 이상 응답하지 않습니다."

      # 5xx 에러율 > 5% (앱별)
      - alert: PlatformAppHighErrorRate
        expr: >
          sum by (app) (rate(http_requests_total{job="v-platform-apps",status=~"5.."}[5m]))
          /
          sum by (app) (rate(http_requests_total{job="v-platform-apps"}[5m]))
          * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "앱 5xx 에러율 초과: {{ $labels.app }}"
          description: "{{ $labels.app }} 백엔드의 5xx 에러율이 5%를 초과했습니다 (현재: {{ $value | printf \"%.1f\" }}%)"

      # P95 응답시간 > 2s (앱별)
      - alert: PlatformAppSlowResponse
        expr: >
          histogram_quantile(0.95,
            sum by (le, app) (rate(http_request_duration_seconds_bucket{job="v-platform-apps"}[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "앱 응답시간 지연: {{ $labels.app }}"
          description: "{{ $labels.app }} 백엔드 P95 응답시간이 2초를 초과했습니다 (현재: {{ $value | printf \"%.2f\" }}s)"

  # ──────────────────────────────────────────────────────────────
  # 앱 도메인 특화 알림
  # ──────────────────────────────────────────────────────────────
  - name: v_platform_domain_alerts
    interval: 30s
    rules:
      # v-channel-bridge: 메시지 브리지 처리 오류 증가
      - alert: BridgeMessageFailureHigh
        expr: >
          sum(rate(http_requests_total{app="v-channel-bridge",endpoint=~"/api/messages.*",status=~"5.."}[5m]))
          > 0.1
        for: 2m
        labels:
          severity: warning
          service: bridge
        annotations:
          summary: "메시지 브리지 오류 증가"
          description: "메시지 처리 에러가 증가하고 있습니다 (현재: {{ $value | printf \"%.2f\" }}/s)"

      # v-itsm: SLA 스케줄러 엔드포인트 에러
      - alert: ItsmSlaEndpointFailure
        expr: >
          sum(rate(http_requests_total{app="v-itsm",endpoint=~"/api/sla.*",status=~"5.."}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: itsm
        annotations:
          summary: "ITSM SLA API 오류"
          description: "SLA 관련 엔드포인트에서 에러가 발생하고 있습니다 (현재: {{ $value | printf \"%.2f\" }}/s)"

  # ──────────────────────────────────────────────────────────────
  # 컨테이너 리소스 알림 (cAdvisor)
  # 대상: v-project.* 및 v-ui-builder-* 컨테이너
  # ──────────────────────────────────────────────────────────────
  - name: container_resource_alerts
    interval: 1m
    rules:
      # 컨테이너 CPU > 80%
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"(v-project|v-ui-builder).*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "컨테이너 CPU 사용률 높음: {{ $labels.name }}"
          description: "{{ $labels.name }} CPU 사용률이 80%를 초과했습니다 (현재: {{ $value | printf \"%.1f\" }}%)"

      # 컨테이너 메모리 > 512MB
      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~"(v-project|v-ui-builder).*"} / 1024 / 1024 > 512
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "컨테이너 메모리 사용량 높음: {{ $labels.name }}"
          description: "{{ $labels.name }} 메모리 사용량이 512MB를 초과했습니다 (현재: {{ $value | printf \"%.0f\" }}MB)"

      # 컨테이너 재시작 > 3회 / 1h
      - alert: ContainerRestarting
        expr: increase(container_start_time_seconds{name=~"(v-project|v-ui-builder).*"}[1h]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "컨테이너 빈번한 재시작: {{ $labels.name }}"
          description: "{{ $labels.name }} 컨테이너가 지난 1시간 동안 3회 이상 재시작되었습니다."

  # ──────────────────────────────────────────────────────────────
  # 호스트 시스템 알림 (Node Exporter)
  # ──────────────────────────────────────────────────────────────
  - name: host_alerts
    interval: 1m
    rules:
      # 루트 디스크 < 10%
      - alert: HostDiskSpaceLow
        expr: >
          (node_filesystem_avail_bytes{mountpoint="/"}
          /
          node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "호스트 디스크 공간 부족"
          description: "루트 파일시스템 여유 공간이 10% 미만입니다 (현재: {{ $value | printf \"%.1f\" }}%)"

      # 호스트 CPU > 85%
      - alert: HostHighCPU
        expr: >
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "호스트 CPU 사용률 높음"
          description: "호스트 CPU 사용률이 85%를 초과했습니다 (현재: {{ $value | printf \"%.1f\" }}%)"
