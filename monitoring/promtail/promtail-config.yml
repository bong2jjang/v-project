# Promtail 설정 - v-project 멀티앱 Docker 컨테이너 로그 수집
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # v-project 전체 앱 Docker 컨테이너 로그 수집
  - job_name: v-project
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=v-project"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - docker: {}

      # structlog JSON 파싱 (app 라벨 포함)
      - json:
          expressions:
            level: level
            message: message
            event: event
            app: app

      # 앱별 라벨 등록
      - labels:
          level:
          service:
          container:
          app:

      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.999999999Z07:00"
          action_on_failure: skip

      - drop:
          expression: '.*/api/health.*'
          drop_counter_reason: health_check_filtered
